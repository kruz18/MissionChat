name: KMP Desktop Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-desktop:
    # Для сборки десктопа (если нужен просто jar или linux дистрибутив).
    # Если нужны .msi или .dmg, потребуются windows-latest и macos-latest (можно настроить через matrix)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Укажи версию Java, которую использует твой проект
          distribution: 'corretto'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate local.properties
        # Достаем секреты из GitHub и записываем их в файл
        env:
          DEEPSEEK_API_KEY_SECRET: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "deepseek.apiKey=$DEEPSEEK_API_KEY_SECRET" >> local.properties

      - name: Build Desktop application
        run: ./gradlew :app:byCompose:desktop:packageReleaseExe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-App
          path: app/byCompose/desktop/build/compose/binaries/main-release/exe/*.jar
          retention-days: 7