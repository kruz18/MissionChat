kotlinx-serialization = "1.10.0"
decompose = "3.4.0"
android-compileSdk = "36"
android-minSdk = "24"
compose-material3 = "1.9.0"
compose-runtime = "1.10.1"
compose-ui = "1.10.1"
compose-uiTextGoogleFonts = "1.10.4"
flowmvi = "3.2.1"
kotlinx-coroutines = "1.10.2"
koin-bom = "4.2.0-RC1"
kotlinx-immutable = "0.4.0"
ktor = "3.4.0"
napier = "2.7.1"
build-konfig = "0.17.1"
mikepenz-markdown = "0.39.2"
room = "2.8.4"
ksp = "2.3.6"
sqlite = "2.6.2"
kotlinx-datetime = "0.7.1"
compose-uiToolingPreview = "1.10.1"

[libraries]
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "androidx-activityCompose" }
androidx-compose-ui-tooling = { module = "androidx.compose.ui:ui-tooling", version.ref = "androidx-ui-tooling" }
androidx-compose-ui-tooling-preview = { module = "androidx.compose.ui:ui-tooling-preview", version.ref = "androidx-ui-tooling" }
compose-components-resources = { module = "org.jetbrains.compose.components:components-resources", version.ref = "compose-componentsResources" }
compose-foundation = { module = "org.jetbrains.compose.foundation:foundation", version.ref = "compose-foundation" }
kotlinx-serialization-core = { module = "org.jetbrains.kotlinx:kotlinx-serialization-core", version.ref = "kotlinx-serialization" }
kotlinx-immutable = { module = "org.jetbrains.kotlinx:kotlinx-collections-immutable", version.ref = "kotlinx-immutable" }
decompose = { module = "com.arkivanov.decompose:decompose", version.ref = "decompose" }
